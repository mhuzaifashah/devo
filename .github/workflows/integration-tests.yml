name: Integration Tests

on:
  push:
    paths:
      - "system.md"
      - "aiagent/agent.py"
      - "aiagent/tools/**"
      - "tests/test_frontend_llm_session.py"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    paths:
      - "system.md"
      - "aiagent/agent.py"
      - "aiagent/tools/**"
      - "tests/test_frontend_llm_session.py"
      - ".github/workflows/integration-tests.yml"
  schedule:
    - cron: "0 3 * * *"
  release:
    types: [prereleased]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      AIAGENT_RUN_LLM_TESTS: "1"
      AIAGENT_TEST_PROVIDER: ${{ secrets.AIAGENT_TEST_PROVIDER }}
      AIAGENT_TEST_MODEL: ${{ secrets.AIAGENT_TEST_MODEL }}
      AIAGENT_TEST_FRONTEND_DIR: ${{ github.workspace }}/tests/fixtures/frontend
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Validate integration settings
        run: |
          if [ -z "${AIAGENT_TEST_PROVIDER}" ] || [ -z "${AIAGENT_TEST_MODEL}" ]; then
            echo "Missing AIAGENT_TEST_PROVIDER or AIAGENT_TEST_MODEL secret."
            exit 1
          fi

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run integration suite
        run: uv run pytest -q -m integration
