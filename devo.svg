<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <symbol id="p">
      <rect width="12" height="12" fill="#87CEEB"/>
      <rect x="2" y="2" width="8" height="8" fill="#0d1117"/>
    </symbol>
  </defs>
  <rect width="420" height="160" fill="#0d1117" rx="8"/>
  <rect x="0.5" y="0.5" width="419" height="159" fill="none" stroke="#87CEEB" stroke-width="1" stroke-opacity="0.25" rx="8"/>
  <g filter="url(#glow)">
    <!-- D -->
    <use href="#p" x="30"  y="25"/><use href="#p" x="45"  y="25"/><use href="#p" x="60"  y="25"/>
    <use href="#p" x="30"  y="40"/><use href="#p" x="75"  y="40"/>
    <use href="#p" x="30"  y="55"/><use href="#p" x="90"  y="55"/>
    <use href="#p" x="30"  y="70"/><use href="#p" x="90"  y="70"/>
    <use href="#p" x="30"  y="85"/><use href="#p" x="90"  y="85"/>
    <use href="#p" x="30"  y="100"/><use href="#p" x="75" y="100"/>
    <use href="#p" x="30"  y="115"/><use href="#p" x="45" y="115"/><use href="#p" x="60" y="115"/>
    <!-- E -->
    <use href="#p" x="120" y="25"/><use href="#p" x="135" y="25"/><use href="#p" x="150" y="25"/><use href="#p" x="165" y="25"/><use href="#p" x="180" y="25"/>
    <use href="#p" x="120" y="40"/>
    <use href="#p" x="120" y="55"/>
    <use href="#p" x="120" y="70"/><use href="#p" x="135" y="70"/><use href="#p" x="150" y="70"/><use href="#p" x="165" y="70"/>
    <use href="#p" x="120" y="85"/>
    <use href="#p" x="120" y="100"/>
    <use href="#p" x="120" y="115"/><use href="#p" x="135" y="115"/><use href="#p" x="150" y="115"/><use href="#p" x="165" y="115"/><use href="#p" x="180" y="115"/>
    <!-- V -->
    <use href="#p" x="210" y="25"/><use href="#p" x="270" y="25"/>
    <use href="#p" x="210" y="40"/><use href="#p" x="270" y="40"/>
    <use href="#p" x="210" y="55"/><use href="#p" x="270" y="55"/>
    <use href="#p" x="210" y="70"/><use href="#p" x="270" y="70"/>
    <use href="#p" x="225" y="85"/><use href="#p" x="255" y="85"/>
    <use href="#p" x="225" y="100"/><use href="#p" x="255" y="100"/>
    <use href="#p" x="240" y="115"/>
    <!-- O -->
    <use href="#p" x="315" y="25"/><use href="#p" x="330" y="25"/><use href="#p" x="345" y="25"/>
    <use href="#p" x="300" y="40"/><use href="#p" x="360" y="40"/>
    <use href="#p" x="300" y="55"/><use href="#p" x="360" y="55"/>
    <use href="#p" x="300" y="70"/><use href="#p" x="360" y="70"/>
    <use href="#p" x="300" y="85"/><use href="#p" x="360" y="85"/>
    <use href="#p" x="300" y="100"/><use href="#p" x="360" y="100"/>
    <use href="#p" x="315" y="115"/><use href="#p" x="330" y="115"/><use href="#p" x="345" y="115"/>
